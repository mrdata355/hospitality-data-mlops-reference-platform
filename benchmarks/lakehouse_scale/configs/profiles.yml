version: 1

defaults:
  output_format: delta
  target_file_size_mib: 256
  history_days: 730
  anomaly_basis_points:
    duplicate_rows: 5
    null_business_fields: 10
    late_arrivals: 100
    hot_resort_records: 1500

profiles:
  sample:
    description: Credential-free local or development smoke profile.
    target_logical_bytes: 67108864
    require_large_run_confirmation: false
  100gb:
    description: Integration-scale run used before any terabyte benchmark.
    target_logical_bytes: 107374182400
    require_large_run_confirmation: true
  1tb:
    description: First distributed scale and cost-validation gate.
    target_logical_bytes: 1099511627776
    require_large_run_confirmation: true
  10tb:
    description: Final controlled benchmark after the 1 TB gate passes.
    target_logical_bytes: 10995116277760
    require_large_run_confirmation: true

