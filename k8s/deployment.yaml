apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-risk-api
  labels:
    app: member-risk-api
    app.kubernetes.io/name: member-risk-api
    app.kubernetes.io/component: model-serving
    app.kubernetes.io/version: "1.1.0"
spec:
  replicas: 3
  revisionHistoryLimit: 10
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: member-risk-api
  template:
    metadata:
      labels:
        app: member-risk-api
        app.kubernetes.io/name: member-risk-api
        app.kubernetes.io/component: model-serving
        app.kubernetes.io/version: "1.1.0"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: member-risk-api
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: member-risk-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: member-risk-api
      containers:
        - name: api
          image: ghcr.io/mrdata355/hospitality-data-mlops-reference-platform:1.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              value: production
            - name: MODEL_SOURCE
              value: mlflow
            - name: MODEL_ALIAS
              value: Champion
            - name: MODEL_URI
              valueFrom:
                secretKeyRef:
                  name: member-risk-model-config
                  key: model-uri
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /ready
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
