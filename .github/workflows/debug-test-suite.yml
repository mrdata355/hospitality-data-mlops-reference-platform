name: debug-test-suite

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies quietly
        run: python -m pip install --quiet -r requirements.txt
      - name: Build deterministic artifacts quietly
        run: python scripts/run_all.py >/dev/null
      - name: Run concise test diagnostics
        shell: bash
        run: |
          set +e
          pytest -q --tb=short > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          exit "${status}"
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: pytest-output.txt
          if-no-files-found: error
          retention-days: 1
