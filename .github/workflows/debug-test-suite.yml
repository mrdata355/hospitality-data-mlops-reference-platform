name: debug-test-suite

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies quietly
        run: python -m pip install --quiet -r requirements.txt
      - name: Build deterministic artifacts quietly
        run: python scripts/run_all.py >/dev/null
      - name: Run concise test diagnostics
        run: pytest -q --tb=short
