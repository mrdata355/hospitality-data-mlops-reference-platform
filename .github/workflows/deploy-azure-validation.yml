name: deploy-azure-validation

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region
        required: true
        default: eastus
        type: string
      resource_group:
        description: Resource group dedicated to validation resources
        required: true
        default: hospitality-data-mlops-validation-rg
        type: string
      container_app_environment:
        description: Azure Container Apps environment name
        required: true
        default: hospitality-validation-env
        type: string
      container_app_name:
        description: Validation application name
        required: true
        default: hospitality-member-risk-validation
        type: string
      acr_name:
        description: Globally unique lowercase Azure Container Registry name
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-system-validation
  cancel-in-progress: false

jobs:
  deploy-and-validate:
    name: deploy-and-validate-generated-data-system
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: azure-validation
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install exact runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Generate deterministic platform artifacts
        run: python scripts/run_all.py
      - name: Generate rolling-origin validation evidence
        run: python scripts/run_backtests.py
      - name: Authenticate to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Azure Container App
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          LOCATION: ${{ inputs.location }}
          RESOURCE_GROUP: ${{ inputs.resource_group }}
          CONTAINER_APP_ENVIRONMENT: ${{ inputs.container_app_environment }}
          CONTAINER_APP_NAME: ${{ inputs.container_app_name }}
          ACR_NAME: ${{ inputs.acr_name }}
          BUILD_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_VERSION: 1.1.0
        run: bash scripts/deploy_azure_container_app.sh
      - name: Read deployed URL
        id: deployment
        shell: bash
        run: |
          url="$(python - <<'PY'
          import json
          print(json.load(open('artifacts/deployment/azure-container-app.json'))['url'])
          PY
          )"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
      - name: Validate live application
        run: >-
          python scripts/run_system_validation.py
          --base-url "${{ steps.deployment.outputs.url }}"
          --attempts 60
          --delay-seconds 5
          --evidence artifacts/deployment/system-validation.json
      - name: Finalize deployment evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('artifacts/deployment/azure-container-app.json')
          evidence = json.loads(path.read_text())
          evidence['status'] = 'DEPLOYED_AND_VALIDATED'
          path.write_text(json.dumps(evidence, indent=2, sort_keys=True) + '\n')
          PY
      - name: Publish workflow summary
        run: |
          echo "## Azure system validation" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Deployment and application validation passed." >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Application URL: ${{ steps.deployment.outputs.url }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Data boundary: generated non-production data only." >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload sanitized deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: azure-system-validation-evidence
          path: artifacts/deployment/
          if-no-files-found: error
          retention-days: 14
